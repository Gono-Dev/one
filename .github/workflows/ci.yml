name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --locked

      - name: Test
        run: cargo test --locked

      - name: Compatibility smoke
        run: scripts/compat-smoke.sh

  litmus:
    name: Litmus compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust and litmus
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          sudo apt-get update
          sudo apt-get install -y litmus

      - name: Litmus smoke
        run: RUN_LITMUS=1 scripts/compat-smoke.sh

  package:
    name: Package release artifact
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Package
        run: scripts/package-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gono-one-${{ matrix.os }}
          path: dist/*
