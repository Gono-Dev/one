name: CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  litmus:
    name: Litmus compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust and litmus
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          sudo apt-get update
          sudo apt-get install -y litmus

      - name: Litmus smoke
        run: RUN_LITMUS=1 scripts/compat-smoke.sh

  package:
    name: Package ${{ matrix.release_target }}
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            release_target: linux-x86_64
          - os: ubuntu-24.04-arm
            release_target: linux-aarch64
          - os: macos-15-intel
            release_target: macos-x86_64
          - os: macos-latest
            release_target: macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Package
        env:
          GONO_CLOUD_RELEASE_TARGET: ${{ matrix.release_target }}
        run: scripts/package-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: gono-cloud-${{ matrix.release_target }}
          path: dist/*

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: gono-cloud-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          cat >"${notes_file}" <<EOF
          Gono Cloud ${tag}

          Install:

          \`\`\`sh
          bash <(curl -sL https://run.gono.cloud)
          \`\`\`

          **Important:** Gono Cloud listens only on the local machine interface(127.0.0.1:16102) by default. Use Nginx or another reverse proxy to expose it before accessing from other machines.

          EOF

          assets=(release-assets/*)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "no release artifacts were downloaded" >&2
            exit 1
          fi
          printf '%s\n' "${assets[@]}" | sort

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "Gono Cloud ${tag}" --notes-file "${notes_file}"
            while IFS= read -r asset_name; do
              case "${asset_name}" in
                gono-cloud-[0-9]*-*.tar.gz|gono-cloud-[0-9]*-*.tar.gz.sha256)
                  gh release delete-asset "${tag}" "${asset_name}" --yes
                  ;;
              esac
            done < <(gh release view "${tag}" --json assets --jq '.assets[].name')
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" \
              --title "Gono Cloud ${tag}" \
              --notes-file "${notes_file}" \
              --verify-tag
          fi
